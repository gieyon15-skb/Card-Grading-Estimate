<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Card Grader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080f; --panel:#11111d; --panel2:#0c0c16; --line:#23233a;
  --cyan:#00e5ff; --pink:#ff4081; --gold:#ffd700; --teal:#40e0d0; --silver:#c8c8d4;
  --text:#eaeaf2; --muted:#80808f; --orange:#ff6b35; --amber:#ffaa00;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:"JetBrains Mono",ui-monospace,monospace}
body{
  min-height:100vh;
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(0,229,255,.08), transparent 60%),
    radial-gradient(900px 500px at 100% 110%, rgba(255,64,129,.07), transparent 60%),
    var(--bg);
  background-attachment:fixed;
}
.wrap{max-width:780px;margin:0 auto;padding:28px 18px 60px}
header{text-align:center;margin-bottom:22px}
h1{font-family:"Anton",sans-serif;font-weight:400;letter-spacing:.06em;
  font-size:clamp(34px,9vw,58px);margin:0;line-height:.95;
  background:linear-gradient(180deg,#fff,#9fb8c4);-webkit-background-clip:text;
  background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--muted);font-size:12px;letter-spacing:.18em;text-transform:uppercase;margin-top:8px}
.ver{display:inline-block;margin-top:10px;font-size:11px;font-weight:700;letter-spacing:.1em;
  color:var(--cyan);border:1px solid var(--line);border-radius:20px;padding:3px 12px}

.drop{
  display:block;width:100%;
  border:1.5px dashed var(--line);border-radius:16px;background:var(--panel2);
  padding:30px 20px;text-align:center;transition:.2s;cursor:pointer;position:relative;overflow:hidden}
.drop:hover{border-color:var(--cyan);background:#0e1620}
.drop.busy{pointer-events:none;opacity:.7}
.drop .ic{font-size:30px;margin-bottom:8px;filter:grayscale(.2)}
.drop .t{font-weight:700;font-size:15px}
.drop .h{color:var(--muted);font-size:11.5px;margin-top:6px;line-height:1.5}
#file{display:none}
.btn{display:inline-block;margin-top:14px;background:linear-gradient(180deg,#00e5ff,#0098b3);
  color:#04222a;font-weight:800;border:none;border-radius:10px;padding:11px 22px;
  font-family:inherit;font-size:14px;cursor:pointer;letter-spacing:.02em}

#status{margin:18px 0;text-align:center;font-size:13px;color:var(--muted);min-height:18px}
#status .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--line);
  border-top-color:var(--cyan);border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-right:8px}
@keyframes s{to{transform:rotate(360deg)}}
.err{color:#ff7a7a;background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.25);
  border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.55}

#result{display:none;margin-top:8px}
.card-frame{background:var(--panel);border:1px solid var(--line);border-radius:16px;
  padding:14px;text-align:center}
.card-frame .cap{font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
#card-canvas{max-width:100%;height:auto;border-radius:8px;display:inline-block;touch-action:none;cursor:grab}
.adjust-hint{margin-top:8px;font-size:12px;color:#8b93a7;text-align:center;line-height:1.4}
.warn-banner{background:rgba(255,138,0,.14);border:1px solid rgba(255,138,0,.5);color:#ffb86b;padding:12px 14px;border-radius:10px;margin-bottom:14px;font-size:13px;line-height:1.5}
.stage-actions{margin-top:10px;text-align:center}
#outline-controls{display:inline-flex;gap:8px}
.mini{font:600 12px "JetBrains Mono",monospace;color:#0a0e1a;background:#40e0d0;border:none;
  padding:7px 12px;border-radius:7px;cursor:pointer}
.mini.ghost{background:transparent;color:#8b93a7;border:1px solid #2a3142}

.section{margin-top:16px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px 16px 18px}
.section h2{font-family:"Anton",sans-serif;font-weight:400;letter-spacing:.05em;
  font-size:15px;margin:0 0 14px;color:#cfd8df;text-transform:uppercase}

.bars{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:end;height:150px}
.bar{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bar .val{font-size:12px;font-weight:700;margin-bottom:6px}
.bar .col{width:70%;border-radius:5px 5px 0 0;min-height:4px;transition:height .5s ease}
.bar .lab{font-size:11px;color:var(--muted);margin-top:8px}

.metrics{display:grid;grid-template-columns:1fr;gap:14px}
.mrow{font-size:13px;line-height:1.6}
.mrow .k{color:var(--muted);font-size:11px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:3px}
.corner-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.corner-grid .cc{padding:11px 13px;background:var(--panel2);border-radius:10px;border:1px solid transparent}
.corner-grid .cc.weak{border-color:var(--orange)}
.corner-grid .cc .cn{color:var(--muted);font-size:11px;letter-spacing:.14em;font-weight:700}
.corner-grid .cc .cm{font-size:17px;font-weight:700;margin:4px 0 5px;color:var(--text)}
.corner-grid .cc .cs{color:#7d7d8c;font-size:12px}

.grades{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grade{background:var(--panel2);border-radius:12px;padding:12px 10px;text-align:center;border-top:2px solid}
.grade .co{font-size:11px;letter-spacing:.12em;color:var(--muted)}
.grade .g{font-family:"Anton",sans-serif;font-size:28px;line-height:1.1;margin:4px 0}
.grade .l{font-size:10.5px;color:var(--muted);min-height:13px}

.picks{display:flex;flex-direction:column;gap:12px}
.pick{background:var(--panel2);border-radius:12px;padding:13px 14px;border-left:3px solid}
.pick .hd{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.pick .rk{font-family:"Anton",sans-serif;font-size:16px;opacity:.6;min-width:18px}
.pick .co{font-weight:800;font-size:15px;letter-spacing:.03em}
.pick .vd{margin-left:auto;font-size:10.5px;font-weight:700;letter-spacing:.06em;
  padding:3px 9px;border-radius:20px;text-transform:uppercase}
.pick .ln{font-size:11.5px;color:#a6a6b6;line-height:1.55}

.foot{color:#55555f;font-size:10.5px;font-style:italic;text-align:center;margin-top:16px;line-height:1.5}
.again{display:block;margin:18px auto 0;background:transparent;border:1px solid var(--line);
  color:var(--muted);border-radius:10px;padding:10px 18px;font-family:inherit;font-size:12.5px;cursor:pointer}
.again:hover{border-color:var(--cyan);color:var(--cyan)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Card Grader</h1>
    <div class="sub">Centering · Corners · PSA / BGS / TAG</div>
    <div class="ver">v13</div>
  </header>

  <label class="drop" id="drop" for="file">
    <div class="ic">🃏</div>
    <div class="t" id="drop-title">Loading engine…</div>
    <div class="h">Upload a straight-on photo of the full card on a plain dark background. Good even lighting, no glare.</div>
    <span class="btn" id="drop-btn" style="display:none">Choose Photo</span>
    <input type="file" id="file" accept="image/*">
  </label>

  <div id="status"></div>

  <div id="result"></div>
</div>

<canvas id="work" style="display:none"></canvas>

<script>
/* ===================== Constants ===================== */
const CARD_W_MM=63.0, CARD_H_MM=88.0, CARD_RATIO=CARD_H_MM/CARD_W_MM;
const OUT_W=2520, OUT_H=3520;
const MARGIN=Math.round(OUT_W*0.08), MW=OUT_W+2*MARGIN, MH=OUT_H+2*MARGIN;
const PX_MM_W=OUT_W/CARD_W_MM, PX_MM_H=OUT_H/CARD_H_MM;
const PSA_GRADES=[[55,10,"Gem Mint"],[60,9,"Mint"],[65,8,"NM-MT"],[70,7,"NM"],
  [75,6,"EX-MT"],[80,5,"EX"],[85,4,"VG-EX"],[100,3,"VG"]];
const BGS_GRADES=[[50.5,10.0],[52,9.5],[55,9.0],[60,8.5],[65,8.0],[70,7.5],[75,7.0],[100,6.0]];

let CV_READY=false;

/* ===================== Math helpers ===================== */
const mean=a=>a.reduce((s,x)=>s+x,0)/a.length;
const polyval=(fit,x)=>fit[0]*x+fit[1];           // degree-1: m*x + c

function smoothNp(arr,k=5){
  const n=arr.length; if(n<k) return Array.from(arr);
  const out=new Float64Array(n); const half=Math.floor(k/2);
  for(let i=0;i<n;i++){let s=0;for(let j=0;j<k;j++){const idx=i+j-half;if(idx>=0&&idx<n)s+=arr[idx];}out[i]=s/k;}
  return out;
}
function peakAt(profile,lo,hi){
  lo=Math.max(0,Math.round(lo)); hi=Math.min(profile.length,Math.round(hi));
  if(hi<=lo) return Math.floor((lo+hi)/2);
  const sub=Array.prototype.slice.call(profile,lo,hi);
  const z=smoothNp(sub); let bi=0,bv=-Infinity;
  for(let i=0;i<z.length;i++) if(z[i]>bv){bv=z[i];bi=i;}
  return bi+lo;
}
function ransacLine(pts,isVertical,threshold){
  let bestM=0,bestC=0,maxIn=-1,minRes=Infinity,bestInliers=pts;
  const n=pts.length; if(n<2) return [0,0];
  for(let i=0;i<n;i++){for(let j=i+1;j<n;j++){
    const p1=pts[i],p2=pts[j]; let m,c;
    if(isVertical){ if(p2[1]===p1[1])continue; m=(p2[0]-p1[0])/(p2[1]-p1[1]); c=p1[0]-m*p1[1]; }
    else{ if(p2[0]===p1[0])continue; m=(p2[1]-p1[1])/(p2[0]-p1[0]); c=p1[1]-m*p1[0]; }
    const inl=[]; let rs=0;
    for(const p of pts){
      const res=isVertical?Math.abs(p[0]-(m*p[1]+c)):Math.abs(p[1]-(m*p[0]+c));
      if(res<=threshold){inl.push(p);rs+=res;}
    }
    if(inl.length>maxIn||(inl.length===maxIn&&rs<minRes)){maxIn=inl.length;minRes=rs;bestM=m;bestC=c;bestInliers=inl;}
  }}
  if(bestInliers.length>=2){
    if(isVertical){
      const Y=bestInliers.map(p=>p[1]),X=bestInliers.map(p=>p[0]);
      const yb=mean(Y),xb=mean(X); let den=0,num=0;
      for(let i=0;i<Y.length;i++){den+=(Y[i]-yb)**2;num+=(Y[i]-yb)*(X[i]-xb);}
      if(den!==0){bestM=num/den;bestC=xb-bestM*yb;}
    }else{
      const X=bestInliers.map(p=>p[0]),Y=bestInliers.map(p=>p[1]);
      const xb=mean(X),yb=mean(Y); let den=0,num=0;
      for(let i=0;i<X.length;i++){den+=(X[i]-xb)**2;num+=(X[i]-xb)*(Y[i]-yb);}
      if(den!==0){bestM=num/den;bestC=yb-bestM*xb;}
    }
  }
  return [bestM,bestC];
}
function orderPoints(pts){
  let tl,tr,br,bl,minS=Infinity,maxS=-Infinity,minD=Infinity,maxD=-Infinity;
  for(const[x,y]of pts){const s=x+y,d=y-x;
    if(s<minS){minS=s;tl=[x,y];} if(s>maxS){maxS=s;br=[x,y];}
    if(d<minD){minD=d;tr=[x,y];} if(d>maxD){maxD=d;bl=[x,y];}}
  return[tl,tr,br,bl];
}

/* ===================== CV pipeline ===================== */
function detectCard(src){
  const h=src.rows,w=src.cols;
  const scale=Math.min(1.0,900/Math.max(h,w));
  const small=new cv.Mat();
  cv.resize(src,small,new cv.Size(Math.round(w*scale),Math.round(h*scale)));
  const grayS=new cv.Mat(); cv.cvtColor(small,grayS,cv.COLOR_RGBA2GRAY);
  const blur=new cv.Mat(); cv.bilateralFilter(grayS,blur,9,75,75);
  let best=null,bestConf=0;
  for(const[lo,hi]of[[30,90],[50,150],[15,60],[80,200],[100,250]]){
    const r=tryContours(blur,lo,hi,scale);
    if(r&&r.score>bestConf){bestConf=r.score;best=r.corners;}
  }
  small.delete();grayS.delete();blur.delete();
  return {corners:best,conf:Math.min(100,bestConf*200)};
}
function tryContours(prep,lo,hi,scale){
  const edges=new cv.Mat(); cv.Canny(prep,edges,lo,hi);
  const kernel=cv.Mat.ones(3,3,cv.CV_8U);
  cv.dilate(edges,edges,kernel,new cv.Point(-1,-1),2);
  const contours=new cv.MatVector(),hierarchy=new cv.Mat();
  cv.findContours(edges,contours,hierarchy,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE);
  const sh=prep.rows,sw=prep.cols;
  const arr=[];
  for(let i=0;i<contours.size();i++){const c=contours.get(i);arr.push({i,area:cv.contourArea(c)});}
  arr.sort((a,b)=>b.area-a.area);
  let best=null,bestS=0; const lim=Math.min(15,arr.length);
  for(let k=0;k<lim;k++){
    const {i,area}=arr[k]; if(area<sh*sw*0.05)continue;
    const c=contours.get(i);
    const rr=cv.minAreaRect(c); const rw=rr.size.width,rh=rr.size.height;
    if(rw===0||rh===0)continue;
    const ratio=Math.max(rw,rh)/Math.min(rw,rh);
    if(ratio>1.1&&ratio<1.7){
      const d=c.data32S; const np=c.rows;
      let tl,tr,br,bl,minS=Infinity,maxS=-Infinity,minD=Infinity,maxD=-Infinity;
      for(let p=0;p<np;p++){const x=d[p*2],y=d[p*2+1];const s=x+y,df=y-x;
        if(s<minS){minS=s;tl=[x,y];} if(s>maxS){maxS=s;br=[x,y];}
        if(df<minD){minD=df;tr=[x,y];} if(df>maxD){maxD=df;bl=[x,y];}}
      const score=(area/(sh*sw))*(1-Math.abs(ratio-CARD_RATIO));
      if(score>bestS){bestS=score;best=[tl,tr,br,bl].map(([x,y])=>[x/scale,y/scale]);}
    }
  }
  edges.delete();kernel.delete();contours.delete();hierarchy.delete();
  return best?{corners:best,score:bestS}:null;
}
function refineCorners(src,initial){
  const [tl,tr,br,bl]=orderPoints(initial);
  const center=[(tl[0]+tr[0]+br[0]+bl[0])/4,(tl[1]+tr[1]+br[1]+bl[1])/4];
  const gray=new cv.Mat(); cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
  const grayF=new cv.Mat(); gray.convertTo(grayF,cv.CV_32F);
  const blur=new cv.Mat(); cv.GaussianBlur(grayF,blur,new cv.Size(9,9),0);
  const H=blur.rows,W=blur.cols,data=blur.data32F;
  const SW=Math.max(80,Math.round(Math.min(H,W)*0.05)),N=25;
  function edgePoints(p1,p2){
    const ev=[p2[0]-p1[0],p2[1]-p1[1]],el=Math.hypot(ev[0],ev[1]);
    if(el<5)return[];
    const eu=[ev[0]/el,ev[1]/el]; let perp=[-eu[1],eu[0]];
    const mid=[(p1[0]+p2[0])/2,(p1[1]+p2[1])/2];
    if(perp[0]*(center[0]-mid[0])+perp[1]*(center[1]-mid[1])<0)perp=[-perp[0],-perp[1]];
    const found=[];
    for(let ti=0;ti<N;ti++){
      const t=0.08+(0.84)*ti/(N-1);
      const cx=p1[0]+t*ev[0],cy=p1[1]+t*ev[1];
      const ds=[]; for(let d=-SW;d<=SW;d+=2)ds.push(d);
      const vals=new Float64Array(ds.length);
      for(let i=0;i<ds.length;i++){
        let x=Math.round(cx+ds[i]*perp[0]),y=Math.round(cy+ds[i]*perp[1]);
        x=Math.min(Math.max(x,0),W-1); y=Math.min(Math.max(y,0),H-1);
        vals[i]=data[y*W+x];
      }
      let bi=0,bv=-Infinity;
      for(let i=0;i<vals.length-1;i++){const g=Math.abs(vals[i+1]-vals[i]);if(g>bv){bv=g;bi=i;}}
      const dE=(ds[bi]+ds[bi+1])/2,rx=cx+dE*perp[0],ry=cy+dE*perp[1];
      if(rx>=0&&rx<W&&ry>=0&&ry<H)found.push([rx,ry]);
    }
    return found;
  }
  const topPts=edgePoints(tl,tr),rightPts=edgePoints(tr,br),
        botPts=edgePoints(br,bl),leftPts=edgePoints(bl,tl);
  gray.delete();grayF.delete();blur.delete();
  if([topPts,rightPts,botPts,leftPts].some(p=>p.length<6))return [tl,tr,br,bl];
  const tf=ransacLine(topPts,false,4.0),rf=ransacLine(rightPts,true,4.0),
        bf=ransacLine(botPts,false,4.0),lf=ransacLine(leftPts,true,4.0);
  function inter(hf,vf){const[mh,bh]=hf,[mv,bv]=vf;const den=1-mv*mh;
    if(Math.abs(den)<1e-8)return null;const x=(mv*bh+bv)/den;return[x,mh*x+bh];}
  const nc=[inter(tf,lf),inter(tf,rf),inter(bf,rf),inter(bf,lf)];
  if(nc.some(p=>p===null))return [tl,tr,br,bl];
  return nc;
}
function warpCard(src,corners){
  const [tl,tr,br,bl]=orderPoints(corners);
  const srcTri=cv.matFromArray(4,1,cv.CV_32FC2,[tl[0],tl[1],tr[0],tr[1],br[0],br[1],bl[0],bl[1]]);
  const dstTri=cv.matFromArray(4,1,cv.CV_32FC2,[0,0,OUT_W-1,0,OUT_W-1,OUT_H-1,0,OUT_H-1]);
  const M=cv.getPerspectiveTransform(srcTri,dstTri);
  const warped=new cv.Mat();
  cv.warpPerspective(src,warped,M,new cv.Size(OUT_W,OUT_H));
  srcTri.delete();dstTri.delete();M.delete();
  return warped;
}
// Warp the card into an inset rectangle inside a larger canvas, leaving a MARGIN of the
// surrounding photo on every side. This keeps the true card edge VISIBLE inside the view
// (instead of pinned to the image edge), so the card-edge lines can be dragged onto it —
// recovering any card the detector cropped, and re-anchoring corners to the real edge.
function warpCardMargin(src,corners){
  const [tl,tr,br,bl]=orderPoints(corners);
  const a=MARGIN, x1=a, y1=a, x2=a+OUT_W-1, y2=a+OUT_H-1;
  const srcTri=cv.matFromArray(4,1,cv.CV_32FC2,[tl[0],tl[1],tr[0],tr[1],br[0],br[1],bl[0],bl[1]]);
  const dstTri=cv.matFromArray(4,1,cv.CV_32FC2,[x1,y1,x2,y1,x2,y2,x1,y2]);
  const M=cv.getPerspectiveTransform(srcTri,dstTri);
  const warped=new cv.Mat();
  cv.warpPerspective(src,warped,M,new cv.Size(MW,MH));
  srcTri.delete();dstTri.delete();M.delete();
  return warped;
}
function pctile(arr,p){const s=Array.prototype.slice.call(arr).sort((a,b)=>a-b);
  const idx=p*(s.length-1),lo=Math.floor(idx),hi=Math.ceil(idx);
  return lo===hi?s[lo]:s[lo]+(s[hi]-s[lo])*(idx-lo);}
// Find the frame->art edge in a 1-D edge-energy profile by locating the OUTERMOST
// sustained rise from the plain frame into the busy art. This avoids latching onto
// brighter INTERNAL edges (title bars, text) that sit deeper in. If the detected rise
// is suspiciously shallow (<0.8mm, e.g. card-edge/background bleed) we report low
// confidence and the caller keeps the simple strongest-edge behavior.
function frameAnchor(prof,lo,hi,pxmm){
  const sm=smoothNp(Array.prototype.slice.call(prof,lo,hi),5);
  const m=sm.length; let am=0,av=-Infinity;
  for(let i=0;i<m;i++) if(sm[i]>av){av=sm[i];am=i;} am+=lo;
  if(m<8) return {idx:am,conf:false};
  const win=Math.max(6,Math.round(0.25*pxmm)), wmLen=Math.max(1,m-win);
  const wm=new Float64Array(wmLen);
  for(let i=0;i<wmLen;i++){let s=0;for(let u=i;u<i+win;u++)s+=sm[u];wm[i]=s/win;}
  const front=Math.max(3,Math.floor(wmLen/3));
  const base=pctile(wm.slice(0,front),0.25), hiE=pctile(wm,0.90);
  const thr=base+0.45*(hiE-base); let st=am;
  for(let i=0;i<wmLen;i++){
    if(wm[i]>=thr){let s=0;for(let u=i;u<i+win;u++)s+=sm[u];
      if(s/win>=thr){let bi=i,bv=-Infinity;
        for(let u=i;u<Math.min(i+win,m);u++) if(sm[u]>bv){bv=sm[u];bi=u;}
        st=lo+bi; break;}}
  }
  if((st-lo)<0.8*pxmm) return {idx:am,conf:false};
  return {idx:st,conf:true};
}
function measureBorders(warped){
  const gray=new cv.Mat(); cv.cvtColor(warped,gray,cv.COLOR_RGBA2GRAY);
  const grayF=new cv.Mat(); gray.convertTo(grayF,cv.CV_32F);
  const blur=new cv.Mat(); cv.GaussianBlur(grayF,blur,new cv.Size(5,5),0);
  const H=blur.rows,W=blur.cols;
  const sxM=new cv.Mat(),syM=new cv.Mat();
  cv.Sobel(blur,sxM,cv.CV_32F,1,0,5);
  cv.Sobel(blur,syM,cv.CV_32F,0,1,5);
  const sx=sxM.data32F,sy=syM.data32F;
  const SKIP=Math.round(0.15*PX_MM_W);
  const lk_h=Math.max(Math.round(H*0.055),SKIP+10);
  const lk_w=Math.max(Math.round(W*0.065),SKIP+10);
  const NS=25,lPts=[],rPts=[],tPts=[],bPts=[];
  // Top/bottom anchors (frame->art) from the averaged edge profile, so internal text
  // bars don't get mistaken for the border. Left/right are left as-is (already robust).
  const c0=Math.floor(W*0.12),c1=Math.floor(W*0.88);
  const profTB=new Float64Array(H);
  for(let r=0;r<H;r++){let s=0;for(let c=c0;c<c1;c++)s+=Math.abs(sy[r*W+c]);profTB[r]=s/(c1-c0);}
  const profTBrev=new Float64Array(H); for(let k=0;k<H;k++)profTBrev[k]=profTB[H-1-k];
  const aT=frameAnchor(profTB,SKIP,lk_h,PX_MM_H);
  const aBr=frameAnchor(profTBrev,SKIP,lk_h,PX_MM_H);
  const Ta=aT.idx, confT=aT.conf, Ba=H-1-aBr.idx, confB=aBr.conf;
  const WINh=Math.round(0.45*PX_MM_H);
  const tLo=confT?Math.max(SKIP,Ta-WINh):SKIP, tHi=confT?Math.min(lk_h,Ta+WINh):lk_h;
  const bLo=confB?Math.max(H-lk_h,Ba-WINh):H-lk_h, bHi=confB?Math.min(H-SKIP,Ba+WINh):H-SKIP;
  for(let i=0;i<NS;i++){
    const y=Math.round(H*0.1+(H*0.8)*i/(NS-1));
    const yMin=Math.max(0,y-1),yMax=Math.min(H,y+2),nr=yMax-yMin;
    const prof=new Float64Array(W);
    for(let c=0;c<W;c++){let s=0;for(let r=yMin;r<yMax;r++)s+=Math.abs(sx[r*W+c]);prof[c]=s/nr;}
    lPts.push([peakAt(prof,SKIP,lk_w),y]);
    rPts.push([peakAt(prof,W-lk_w,W-SKIP),y]);
  }
  for(let i=0;i<NS;i++){
    const x=Math.round(W*0.1+(W*0.8)*i/(NS-1));
    const xMin=Math.max(0,x-1),xMax=Math.min(W,x+2),nc=xMax-xMin;
    const prof=new Float64Array(H);
    for(let r=0;r<H;r++){let s=0;for(let c=xMin;c<xMax;c++)s+=Math.abs(sy[r*W+c]);prof[r]=s/nc;}
    tPts.push([x,peakAt(prof,tLo,tHi)]);
    bPts.push([x,peakAt(prof,bLo,bHi)]);
  }
  const l_fit=ransacLine(lPts,true,3.0),r_fit=ransacLine(rPts,true,3.0),
        t_fit=ransacLine(tPts,false,3.0),b_fit=ransacLine(bPts,false,3.0);
  const Lc=polyval(l_fit,H/2),Rc=W-polyval(r_fit,H/2),
        Tc=polyval(t_fit,W/2),Bc=H-polyval(b_fit,W/2);
  gray.delete();grayF.delete();blur.delete();sxM.delete();syM.delete();
  const clamp=(v,dim)=>Math.max(3,Math.min(v,Math.round(dim*0.14)));
  return {top:clamp(Tc,H),bottom:clamp(Bc,H),left:clamp(Lc,W),right:clamp(Rc,W),
    l_fit,r_fit,t_fit,b_fit};
}
function diagXY(name,t,n){
  if(name==='TL')return[t,t];
  if(name==='TR')return[n-1-t,t];
  if(name==='BL')return[t,n-1-t];
  return[n-1-t,n-1-t];
}
function cornerSetback(prof,n){
  // Geometric corner rounding only. Conservative: a corner is only flagged as rounded
  // when its tip is GENUINELY dark background (the corner is cut/rounded against the dark
  // mat) AND the rise back to card brightness sits in a plausible band. Holographic foil,
  // busy art, and loose detection produce ambiguous reads, which are treated as sharp
  // (wear/physical condition is assumed perfect, so we never invent damage).
  let cs=0,cc=0; const ia=Math.floor(n*0.55),ib=Math.floor(n*0.95);
  for(let t=ia;t<ib;t++){cs+=prof[t];cc++;}
  const cardRef=cc?cs/cc:prof[n-1];
  let ts=0,tc=0; const tnn=Math.min(4,n);
  for(let t=0;t<tnn;t++){ts+=prof[t];tc++;}
  const tipVal=tc?ts/tc:prof[0];
  const contrast=cardRef-tipVal; const look=Math.floor(n*0.5); let setback=0;
  if(contrast>25 && tipVal<50){
    const thr=tipVal+0.5*contrast; let rise=-1;
    for(let t=0;t<look;t++){
      if(prof[t]>=thr){
        let s=0,k=0; for(let u=t;u<Math.min(t+8,n);u++){s+=prof[u];k++;}
        if(k && s/k>=thr){ rise=t; break; }
      }
    }
    if(rise>6 && rise<=35) setback=rise;
  }
  return setback;
}
// BGS: strict, half-point corner sub-grade (a small rounding drops it quickly)
function bgsCornerGrade(sb){
  if(sb<=2)return 10.0; if(sb<=4)return 9.5; if(sb<=7)return 9.0;
  if(sb<=11)return 8.5; if(sb<=16)return 8.0; if(sb<=24)return 7.5; return 7.0;
}
// TAG: granular 1000-point corner score (continuous), more forgiving slope
function tagCornerPts(sb){ return sb<=2?1000:Math.max(600,Math.round(1000-sb*10)); }
function assessCorners(warped){
  const H=warped.rows,W=warped.cols,R=Math.round(OUT_W*0.07);
  const pos={TL:[0,0],TR:[W-R,0],BL:[0,H-R],BR:[W-R,H-R]};
  const metrics={};
  for(const name of ['TL','TR','BL','BR']){
    const [x0,y0]=pos[name];
    const roi=warped.roi(new cv.Rect(x0,y0,R,R));
    const gray=new cv.Mat(); cv.cvtColor(roi,gray,cv.COLOR_RGBA2GRAY);
    const blur=new cv.Mat(); cv.GaussianBlur(gray,blur,new cv.Size(5,5),0);
    const bF=new cv.Mat(); blur.convertTo(bF,cv.CV_32F);
    const n=R,data=bF.data32F;
    const prof=new Float64Array(n);
    for(let t=0;t<n;t++){const[c,r]=diagXY(name,t,n);prof[t]=data[r*n+c];}
    const sb=cornerSetback(prof,n);
    metrics[name]={setback:sb, mm:sb/PX_MM_W, bgs:bgsCornerGrade(sb), tag:tagCornerPts(sb)};
    roi.delete();gray.delete();blur.delete();bF.delete();
  }
  let bgsCorner=10.0, tagCorner=1000, worst='TL', worstSb=-1;
  for(const k in metrics){
    bgsCorner=Math.min(bgsCorner,metrics[k].bgs);
    tagCorner=Math.min(tagCorner,metrics[k].tag);
    if(metrics[k].setback>worstSb){worstSb=metrics[k].setback;worst=k;}
  }
  return {bgsCorner,tagCorner,worst,metrics};
}

/* ===================== Centering / Grades / Strategy ===================== */
function computeCentering(b){
  const L=b.left,R=b.right,T=b.top,B=b.bottom;
  const lr=Math.max(L+R,1),tb=Math.max(T+B,1);
  return {L,R,T,B,
    L_mm:L/PX_MM_W,R_mm:R/PX_MM_W,T_mm:T/PX_MM_H,B_mm:B/PX_MM_H,
    L_pct:L/lr*100,R_pct:R/lr*100,T_pct:T/tb*100,B_pct:B/tb*100,
    lr_off:Math.max(L,R)/lr*100,tb_off:Math.max(T,B)/tb*100};
}
function estimateGrades(cen,cor){
  const worst=Math.max(cen.lr_off,cen.tb_off);
  let psa_g=1,psa_n="Poor";
  for(const[thr,g,n]of PSA_GRADES){if(worst<=thr){psa_g=g;psa_n=n;break;}}
  let bgs_cen=5.0;
  for(const[thr,s]of BGS_GRADES){if(worst<=thr){bgs_cen=s;break;}}
  const bgs_corner=cor.bgsCorner;
  let bgs_overall=Math.min(bgs_cen,bgs_corner);
  if(Math.abs(bgs_cen-bgs_corner)>=1.0)bgs_overall+=0.5;
  bgs_overall=Math.min(bgs_overall,10.0);
  const off=worst-50.0; let c;
  if(off<=1.0)c=1000-off*10;
  else if(off<=5.0)c=990-(off-1.0)*10;
  else if(off<=10.0)c=950-(off-5.0)*10;
  else if(off<=15.0)c=900-(off-10.0)*10;
  else if(off<=20.0)c=850-(off-15.0)*10;
  else if(off<=25.0)c=800-(off-20.0)*20;
  else c=Math.max(0,700-(off-25.0)*10);
  const tag_corner=cor.tagCorner;
  const tag_exact=Math.floor(c*0.3+tag_corner*0.3+400);
  const tag_n=tag_exact>=990?"Pristine":tag_exact>=950?"Gem Mint":tag_exact>=900?"Mint":
    tag_exact>=850?"NM-MT+":tag_exact>=800?"NM-MT":tag_exact>=700?"NM":"EX";
  const tag_g=tag_exact>=950?10:tag_exact>=900?9:tag_exact>=850?8.5:
    tag_exact>=800?8:tag_exact>=700?7:6;
  return {psa_g,psa_n,bgs_cen,bgs_corner,bgs_overall,tag_g,tag_n,tag_exact,tag_corner,tag_cen:c};
}
function evaluateStrategy(cen,cor,gr){
  const worst=Math.max(cen.lr_off,cen.tb_off);
  const bgsCorner=gr.bgs_corner;
  const gap=gr.bgs_cen-bgsCorner;
  const weak=cor.worst;
  const lr_hi=Math.max(cen.L_pct,cen.R_pct).toFixed(1),lr_lo=Math.min(cen.L_pct,cen.R_pct).toFixed(1);
  const tb_hi=Math.max(cen.T_pct,cen.B_pct).toFixed(1),tb_lo=Math.min(cen.T_pct,cen.B_pct).toFixed(1);
  const picks=[];
  // TAG — keyed off the predicted score; names the limiting driver + headroom to the next tier
  {
    const cenLoss=0.3*(1000-gr.tag_cen), corLoss=0.3*(1000-gr.tag_corner);
    const drv = corLoss>cenLoss?'Corners':'Centering';
    const gapPerf=1000-gr.tag_exact;
    if(gr.tag_g>=10){
      const sub=gr.tag_exact>=990?'Pristine':'Gem Mint';
      const top=gr.psa_g<10;
      const l2 = gapPerf<=1 ? `Near-flawless — corners and centering both essentially max.`
        : corLoss<1 ? `Corners read max — the ${gapPerf}-pt gap from 1000 is all centering.`
        : `Most of the ${gapPerf}-pt gap from a perfect 1000 traces to ${drv.toLowerCase()}.`;
      picks.push({rank:top?1:2,co:'TAG',verdict:top?'TOP PICK':'STRONG ALT',vcolor:'#40e0d0',
        lines:[`TAG 10 ${sub} predicted — score ${gr.tag_exact}/1000.`,l2]});
    } else if(gr.tag_g>=9){
      const toTen=950-gr.tag_exact;
      picks.push({rank:2,co:'TAG',verdict:'CONSIDER',vcolor:'#40e0d0',
        lines:[`TAG ${gr.tag_g} ${gr.tag_n} predicted — score ${gr.tag_exact}/1000.`,
               `${toTen} pts short of a TAG 10 — the main drag is ${drv.toLowerCase()}.`]});
    } else {
      picks.push({rank:3,co:'TAG',verdict:'SKIP',vcolor:'#888c94',
        lines:[`TAG ${gr.tag_g} ${gr.tag_n} predicted — score ${gr.tag_exact}/1000.`,
               `Held back by ${drv.toLowerCase()} here; PSA likely grades higher.`]});
    }
  }
  // PSA
  if(gr.psa_g===10){
    const r=worst<=51.0?2:1;
    picks.push({rank:r,co:'PSA',verdict:r===2?'STRONG OPTION':'TOP PICK',vcolor:'#ffd700',
      lines:[`Centering clears PSA ${gr.psa_g} (${gr.psa_n}). Holistic model`,
             `absorbs corner flaws. Best resale liquidity at PSA 10.`]});
  } else if(gr.psa_g>=9) picks.push({rank:2,co:'PSA',verdict:'GOOD OPTION',vcolor:'#ffd700',
    lines:[`PSA ${gr.psa_g} (${gr.psa_n}) expected. More forgiving of single-`,
           `category flaws than BGS sub-grade anchoring.`]});
  else picks.push({rank:3,co:'PSA',verdict:'LOWER PRIORITY',vcolor:'#888c94',
    lines:[`Centering limits PSA to ${gr.psa_g} (${gr.psa_n}).`,
           `Reconsider card condition before submitting.`]});
  // BGS
  if(gap>=1.0) picks.push({rank:3,co:'BGS',verdict:'HIGH RISK',vcolor:'#ff6b35',
    lines:[`Weakest-link: ${weak} corner (BGS ${bgsCorner.toFixed(1)}) anchors overall`,
           `to ~${gr.bgs_overall.toFixed(1)}. Centering sub (${gr.bgs_cen.toFixed(1)}) is being wasted.`]});
  else if(gap>=0.5) picks.push({rank:2,co:'BGS',verdict:'MODERATE RISK',vcolor:'#ffaa00',
    lines:[`Corner sub-grade (${bgsCorner.toFixed(1)}) lags centering (${gr.bgs_cen.toFixed(1)}).`,
           `BGS overall ~${gr.bgs_overall.toFixed(1)} — some centering value is lost.`]});
  else picks.push({rank:2,co:'BGS',verdict:'VIABLE',vcolor:'#c0c0c0',
    lines:[`Sub-grades balanced (Cent: ${gr.bgs_cen.toFixed(1)}, Corn: ${bgsCorner.toFixed(1)}).`,
           `BGS overall ~${gr.bgs_overall.toFixed(1)}, set by the centering sub.`]});
  const CO_ORDER={PSA:0,TAG:1,BGS:2};
  picks.sort((a,b)=>a.rank-b.rank||CO_ORDER[a.co]-CO_ORDER[b.co]);
  return picks;
}

/* ===================== Report rendering ===================== */
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

let ADJ=null;  // manual adjustment state (card-edge + print-border lines, in margin-warp px)
function drawLabel(ctx,txt,x,y,col){const w=ctx.measureText(txt).width+10;
  ctx.fillStyle='rgba(8,8,16,.85)';roundRect(ctx,x-w/2,y-9,w,18,5);ctx.fill();
  ctx.fillStyle=col;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(txt,x,y);}

// Centering from the gap between each card-EDGE line (outer) and PRINT-border line (inner).
// The outer lines also calibrate the mm scale (card is 63x88mm), so moving an edge line
// rescales every measurement correctly.
function computeCenteringGap(){
  const o=ADJ.outer,i=ADJ.inner;
  const cardW=Math.max(o.R-o.L,1),cardH=Math.max(o.B-o.T,1);
  const pxx=cardW/CARD_W_MM,pyy=cardH/CARD_H_MM;
  const L=Math.max(0,i.L-o.L),R=Math.max(0,o.R-i.R),T=Math.max(0,i.T-o.T),B=Math.max(0,o.B-i.B);
  const lr=Math.max(L+R,1),tb=Math.max(T+B,1);
  return {L,R,T,B,L_mm:L/pxx,R_mm:R/pxx,T_mm:T/pyy,B_mm:B/pyy,
    L_pct:L/lr*100,R_pct:R/lr*100,T_pct:T/tb*100,B_pct:B/tb*100,
    lr_off:Math.max(L,R)/lr*100,tb_off:Math.max(T,B)/tb*100};
}

function redrawStage(){
  const c=ADJ.canvas,ctx=c.getContext('2d'),{sxf,syf}=ADJ;
  ctx.clearRect(0,0,c.width,c.height); ctx.drawImage(ADJ.cardImg,0,0);
  // center guides: the middle of each edge — the correct place to line each border up
  const ccx=(ADJ.outer.L+ADJ.outer.R)/2*sxf, ccy=(ADJ.outer.T+ADJ.outer.B)/2*syf;
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.4;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(ccx,ADJ.outer.T*syf);ctx.lineTo(ccx,ADJ.outer.B*syf);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ADJ.outer.L*sxf,ccy);ctx.lineTo(ADJ.outer.R*sxf,ccy);ctx.stroke();
  ctx.setLineDash([]);
  const cen=computeCenteringGap();
  const vx=(x,col,w)=>{ctx.strokeStyle=col;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke();};
  const hy=(y,col,w)=>{ctx.strokeStyle=col;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke();};
  vx(ADJ.outer.L*sxf,'#ffd54a',1.5); vx(ADJ.outer.R*sxf,'#ffd54a',1.5);
  hy(ADJ.outer.T*syf,'#ffd54a',1.5); hy(ADJ.outer.B*syf,'#ffd54a',1.5);
  vx(ADJ.inner.L*sxf,'#00e5ff',1.6); vx(ADJ.inner.R*sxf,'#00e5ff',1.6);
  hy(ADJ.inner.T*syf,'#ff4081',1.6); hy(ADJ.inner.B*syf,'#ff4081',1.6);
  const hand=(x,y,col)=>{ctx.fillStyle=col;roundRect(ctx,x-7,y-7,14,14,3);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(x-3.5,y-1,7,2);ctx.fillRect(x-1,y-3.5,2,7);};
  const H=c.height,W=c.width;
  hand(ADJ.outer.L*sxf,H*0.25,'#ffd54a'); hand(ADJ.outer.R*sxf,H*0.25,'#ffd54a');
  hand(W*0.25,ADJ.outer.T*syf,'#ffd54a'); hand(W*0.25,ADJ.outer.B*syf,'#ffd54a');
  hand(ADJ.inner.L*sxf,H*0.5,'#00e5ff'); hand(ADJ.inner.R*sxf,H*0.5,'#00e5ff');
  hand(W*0.5,ADJ.inner.T*syf,'#ff4081'); hand(W*0.5,ADJ.inner.B*syf,'#ff4081');
  ctx.font='700 12px "JetBrains Mono",monospace';
  drawLabel(ctx,cen.L_mm.toFixed(2),(ADJ.outer.L+ADJ.inner.L)/2*sxf,H*0.72,'#00e5ff');
  drawLabel(ctx,cen.R_mm.toFixed(2),(ADJ.outer.R+ADJ.inner.R)/2*sxf,H*0.72,'#00e5ff');
  drawLabel(ctx,cen.T_mm.toFixed(2),W*0.72,(ADJ.outer.T+ADJ.inner.T)/2*syf,'#ff4081');
  drawLabel(ctx,cen.B_mm.toFixed(2),W*0.72,(ADJ.outer.B+ADJ.inner.B)/2*syf,'#ff4081');

  const cardW=ADJ.outer.R-ADJ.outer.L,cardH=ADJ.outer.B-ADJ.outer.T;

  ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=1.2;ctx.setLineDash([5,4]);
  ctx.strokeRect(oLx,oTy,bw,bh); ctx.strokeRect(oRx-bw,oTy,bw,bh);
  ctx.strokeRect(oLx,oBy-bh,bw,bh); ctx.strokeRect(oRx-bw,oBy-bh,bw,bh);
  ctx.setLineDash([]);
}

function outlineWarning(cen){
  const o=ADJ.outer, ratio=(o.R-o.L)/Math.max(o.B-o.T,1), target=CARD_W_MM/CARD_H_MM;
  const aspectOff=Math.abs(ratio-target)/target>0.12;
  const maxB=Math.max(cen.L_mm,cen.R_mm,cen.T_mm,cen.B_mm), tooBig=maxB>6;
  if(!aspectOff&&!tooBig)return '';
  const why=tooBig?`a ${maxB.toFixed(1)}mm border`:'the card shape looks off';
  return `<div class="warn-banner">&#9888; Outline looks off (${why}). Put the <b style="color:#ffd54a">gold</b> lines on the card edge and the <b style="color:#00e5ff">color</b> lines on the print border — numbers below aren't reliable until then.</div>`;
}
function recomputeBody(){
  const cen=computeCenteringGap();
  const gr=estimateGrades(cen,ADJ.cor);
  const strat=evaluateStrategy(cen,ADJ.cor,gr);
  document.getElementById('report-body').innerHTML=outlineWarning(cen)+buildBodyHTML(cen,ADJ.cor,gr,strat);
}

// Re-crop the card rectangle the edge lines define, rescale to OUT_WxOUT_H, re-measure
// corners there. Wrapped so a cv hiccup can never break the report.
function reassessCorners(){
  try{
    const o=ADJ.outer;
    const x=Math.round(o.L),y=Math.round(o.T),w=Math.round(o.R-o.L),h=Math.round(o.B-o.T);
    if(w<40||h<40||x<0||y<0||x+w>MW||y+h>MH)return;
    const roi=ADJ.mwarp.roi(new cv.Rect(x,y,w,h));
    const rs=new cv.Mat(); cv.resize(roi,rs,new cv.Size(OUT_W,OUT_H));
    ADJ.cor=assessCorners(rs); roi.delete(); rs.delete();
  }catch(e){console.warn('corner reassess failed',e);}
}

function setupDrag(){
  const c=ADJ.canvas; let active=null;
  const toCanvas=e=>{const r=c.getBoundingClientRect();
    return {x:(e.clientX-r.left)*(c.width/r.width),y:(e.clientY-r.top)*(c.height/r.height)};};
  const pick=p=>{const {sxf,syf}=ADJ,TOL=16;
    const cand=[['oL',Math.abs(p.x-ADJ.outer.L*sxf)],['oR',Math.abs(p.x-ADJ.outer.R*sxf)],
                ['oT',Math.abs(p.y-ADJ.outer.T*syf)],['oB',Math.abs(p.y-ADJ.outer.B*syf)],
                ['iL',Math.abs(p.x-ADJ.inner.L*sxf)],['iR',Math.abs(p.x-ADJ.inner.R*sxf)],
                ['iT',Math.abs(p.y-ADJ.inner.T*syf)],['iB',Math.abs(p.y-ADJ.inner.B*syf)]];
    cand.sort((a,b)=>a[1]-b[1]); return cand[0][1]<=TOL?cand[0][0]:null;};
  c.addEventListener('pointerdown',e=>{const k=pick(toCanvas(e));
    if(k){active=k;c.setPointerCapture(e.pointerId);c.style.cursor='grabbing';e.preventDefault();}});
  c.addEventListener('pointermove',e=>{const p=toCanvas(e);
    if(!active){c.style.cursor=pick(p)?'grab':'default';return;}
    const {sxf,syf}=ADJ,o=ADJ.outer,i=ADJ.inner,G=8;
    if(active==='oL')o.L=Math.max(3,Math.min(p.x/sxf,i.L-G));
    else if(active==='oR')o.R=Math.min(MW-3,Math.max(p.x/sxf,i.R+G));
    else if(active==='oT')o.T=Math.max(3,Math.min(p.y/syf,i.T-G));
    else if(active==='oB')o.B=Math.min(MH-3,Math.max(p.y/syf,i.B+G));
    else if(active==='iL')i.L=Math.max(o.L+G,Math.min(p.x/sxf,i.R-G));
    else if(active==='iR')i.R=Math.min(o.R-G,Math.max(p.x/sxf,i.L+G));
    else if(active==='iT')i.T=Math.max(o.T+G,Math.min(p.y/syf,i.B-G));
    else if(active==='iB')i.B=Math.min(o.B-G,Math.max(p.y/syf,i.T+G));
    redrawStage(); e.preventDefault();});
  const end=()=>{if(active!==null){active=null;
    c.style.cursor='grab'; reassessCorners(); recomputeBody();}};
  c.addEventListener('pointerup',end); c.addEventListener('pointercancel',end);
}

function setupStage(mwarp,borders,cor){
  const dispW=600,dispH=Math.round(dispW*MH/MW);
  const small=new cv.Mat(); cv.resize(mwarp,small,new cv.Size(dispW,dispH));
  const canvas=document.getElementById('card-canvas');
  cv.imshow(canvas,small); small.delete();
  const off=document.createElement('canvas'); off.width=dispW; off.height=dispH;
  off.getContext('2d').drawImage(canvas,0,0);
  const a=MARGIN;
  ADJ={canvas,cardImg:off,mwarp,cor,sxf:dispW/MW,syf:dispH/MH,
    outer:{L:a,R:a+OUT_W,T:a,B:a+OUT_H},
    inner:{L:a+borders.left,R:a+OUT_W-borders.right,T:a+borders.top,B:a+OUT_H-borders.bottom}};
  setupDrag(); redrawStage();
}

function buildBodyHTML(cen,cor,gr,strategy){
  const lrDir=cen.L_pct>=cen.R_pct?'L':'R', tbDir=cen.T_pct>=cen.B_pct?'T':'B';
  const lrHi=Math.max(cen.L_pct,cen.R_pct).toFixed(1),lrLo=Math.min(cen.L_pct,cen.R_pct).toFixed(1);
  const tbHi=Math.max(cen.T_pct,cen.B_pct).toFixed(1),tbLo=Math.min(cen.T_pct,cen.B_pct).toFixed(1);
  const mmv=[cen.L_mm,cen.R_mm,cen.T_mm,cen.B_mm]; const maxMM=Math.max(...mmv)*1.15;
  const barCols=['#00e5ff','#0093b0','#ff4081','#a30053']; const barLab=['Left','Right','Top','Bottom'];
  let bars='';
  for(let i=0;i<4;i++){const pct=Math.max(4,(mmv[i]/maxMM)*100);
    bars+=`<div class="bar"><div class="val">${mmv[i].toFixed(2)}</div>
      <div class="col" style="height:${pct}%;background:${barCols[i]}"></div>
      <div class="lab">${barLab[i]}</div></div>`;}
  const m=cor.metrics,weak=cor.worst,showWeak=m[weak].setback>0;
  const cc=k=>`<div class="cc${(k===weak&&showWeak)?' weak':''}">
    <div class="cn">${k}</div>
    <div class="cm">${m[k].mm<=0.05?'Sharp':m[k].mm.toFixed(2)+' mm'}</div>
    <div class="cs">BGS ${m[k].bgs.toFixed(1)} &nbsp;·&nbsp; TAG ${m[k].tag}</div></div>`;
  const grade=(co,g,l,col)=>`<div class="grade" style="border-color:${col}">
    <div class="co">${co}</div><div class="g" style="color:${col}">${g}</div><div class="l">${l}</div></div>`;
  let picks='',pi=0;
  for(const p of strategy){const bc=VBADGE[p.verdict]||'#888';pi++;
    picks+=`<div class="pick" style="border-color:${p.vcolor}">
      <div class="hd"><span class="rk">${RANK_NUM[pi]||pi}</span>
      <span class="co" style="color:${p.vcolor}">${p.co}</span>
      <span class="vd" style="background:${bc}22;color:${bc}">${p.verdict}</span></div>
      ${p.lines.map(l=>`<div class="ln">${l}</div>`).join('')}</div>`;}
  return `
    <div class="section"><h2>Border Widths (mm)</h2><div class="bars">${bars}</div></div>
    <div class="section"><h2>Measurements</h2>
      <div class="metrics">
        <div class="mrow"><span class="k">Centering</span>
          L/R&nbsp; <b style="color:var(--cyan)">${lrHi}/${lrLo}</b> (${lrDir} heavy)
          &nbsp;&nbsp; T/B&nbsp; <b style="color:var(--pink)">${tbHi}/${tbLo}</b> (${tbDir} heavy)</div>
        <div class="mrow"><span class="k">Corner rounding — sharpness (wear assumed perfect)</span>
          <div class="corner-grid">${cc('TL')}${cc('TR')}${cc('BL')}${cc('BR')}</div></div>
      </div>
    </div>
    <div class="section"><h2>Estimated Grades</h2>
      <div class="grades">
        ${grade('PSA',gr.psa_g,gr.psa_n,'#ffd700')}
        ${grade('TAG',gr.tag_g,gr.tag_n+' · '+gr.tag_exact,'#40e0d0')}
        ${grade('BGS',gr.bgs_overall.toFixed(1),'Cent '+gr.bgs_cen.toFixed(1)+' · Corn '+gr.bgs_corner.toFixed(1),'#c8c8d4')}
      </div>
    </div>
    <div class="section"><h2>Submission Strategy</h2><div class="picks">${picks}</div></div>`;
}

const VBADGE={'TOP PICK':'#40e0d0','STRONG OPTION':'#ffd700','GOOD OPTION':'#ffd700',
  'STRONG ALT':'#40e0d0',
  'CONSIDER':'#40e0d0','VIABLE':'#c0c0c0','MODERATE RISK':'#ffaa00','HIGH RISK':'#ff6b35',
  'LOWER PRIORITY':'#888c94','SKIP':'#888c94'};
const RANK_NUM={1:'①',2:'②',3:'③'};

function renderReport(warped,borders,cen,cor,gr,strategy){
  const res=document.getElementById('result');
  res.innerHTML=`
    <div class="card-frame">
      <div class="cap">Card Boundary &amp; Border Measurements</div>
      <canvas id="card-canvas"></canvas>
      <div class="adjust-hint"><b style="color:#ffd54a">Gold</b> = card edge · <b style="color:#00e5ff">cyan</b>/<b style="color:#ff4081">pink</b> = print border. Drag any line onto where it belongs — corners and grades update when you release. Dashed boxes = corner zones; faint center lines mark the middle of each edge — line each border up there.</div>
    </div>
    <div id="report-body"></div>
    <div class="foot">Centering and corner <i>roundness</i> are measured. BGS corners reflect roundness; TAG corners reflect corner <i>fill</i> (its fray/whitening is assumed perfect). Surface, edges, and all whitening/wear are assumed perfect — they need physical inspection. Most accurate on standard-bordered cards; full-art foil cards read less reliably, so check the lines and nudge them if needed. Estimate only — not affiliated with PSA, BGS, or TAG.</div>
    <button class="again" id="again">Grade Another Card</button>`;
  res.style.display='block';
  setupStage(warped,borders,cor);
  recomputeBody();
  document.getElementById('again').onclick=()=>{
    if(ADJ&&ADJ.mwarp){try{ADJ.mwarp.delete();}catch(e){}} ADJ=null;
    res.style.display='none'; res.innerHTML='';
    document.getElementById('file').value='';
    setStatus(''); window.scrollTo({top:0,behavior:'smooth'});
  };
  res.scrollIntoView({behavior:'smooth',block:'start'});
}

/* ===================== App flow ===================== */
function setStatus(html){document.getElementById('status').innerHTML=html;}
function setBusy(b){document.getElementById('drop').classList.toggle('busy',b);}
function showError(msg){setStatus(`<div class="err">${msg}</div>`);}

function process(canvas){
  setBusy(true); setStatus('<span class="spin"></span>Analyzing card…');
  setTimeout(()=>{
    let src=null,warped=null;
    try{
      src=cv.imread(canvas);
      const det=detectCard(src);
      if(!det.corners){src.delete();setBusy(false);
        showError("Couldn't locate the card. Use a plain dark background, fill the frame with the whole card, and avoid glare or shadows.");return;}
      // Corner refinement disabled: on foil full-art cards its perpendicular edge-scan
      // latched onto the frame->art line / copyright text instead of the true card edge,
      // cropping the silver frame and collapsing the top/bottom borders. The detected
      // corners warp cleanly on their own.
      const corners=det.corners;
      const mwarp=warpCardMargin(src,corners); src.delete(); src=null;
      // tight card crop (the inset rect) for the initial auto border + corner read
      const card0=mwarp.roi(new cv.Rect(MARGIN,MARGIN,OUT_W,OUT_H)).clone();
      const borders=measureBorders(card0);
      const cor=assessCorners(card0);
      card0.delete();
      const cen=computeCentering(borders);
      const gr=estimateGrades(cen,cor);
      const strat=evaluateStrategy(cen,cor,gr);
      setStatus(''); setBusy(false);
      renderReport(mwarp,borders,cen,cor,gr,strat);
      // NOTE: mwarp is kept alive in ADJ for re-cropping on edge-line drags;
      // it is released in the "Grade Another Card" handler.
    }catch(err){
      if(src)try{src.delete();}catch(e){}
      if(warped)try{warped.delete();}catch(e){}
      if(ADJ&&ADJ.mwarp){try{ADJ.mwarp.delete();}catch(e){} ADJ=null;}
      setBusy(false); showError('Analysis error: '+(err&&err.message?err.message:err));
      console.error(err);
    }
  },60);
}

document.getElementById('file').addEventListener('change',e=>{
  const file=e.target.files&&e.target.files[0]; if(!file)return;
  if(!CV_READY){showError('Engine still loading — try again in a moment.');return;}
  const img=new Image();
  img.onload=()=>{
    const maxSide=4000; let w=img.naturalWidth,h=img.naturalHeight;
    const sc=Math.min(1,maxSide/Math.max(w,h)); w=Math.round(w*sc);h=Math.round(h*sc);
    const c=document.getElementById('work'); c.width=w;c.height=h;
    c.getContext('2d',{willReadFrequently:true}).drawImage(img,0,0,w,h);
    URL.revokeObjectURL(img.src);
    process(c);
  };
  img.onerror=()=>showError('Could not read that image file.');
  img.src=URL.createObjectURL(file);
});

/* OpenCV.js loads `cv` then finishes WASM init asynchronously; we must wait
   for cv.Mat, not just the script's onload. Multiple CDN URLs for resilience. */
const CV_URLS=[
  'https://docs.opencv.org/4.x/opencv.js',
  'https://docs.opencv.org/4.10.0/opencv.js',
  'https://docs.opencv.org/4.8.0/opencv.js',
  'https://docs.opencv.org/4.5.0/opencv.js'
];
let cvUrlIdx=0, cvDone=false;
function loadCv(){
  const s=document.createElement('script');
  s.async=true; s.src=CV_URLS[cvUrlIdx];
  s.onload=onCvLoad;
  s.onerror=()=>{ cvUrlIdx++; if(cvUrlIdx<CV_URLS.length) loadCv(); else cvFailed(); };
  document.head.appendChild(s);
}
function onCvLoad(){
  const start=Date.now();
  (function wait(){
    if(cvDone) return;
    if(typeof cv!=='undefined' && cv){
      if(cv.Mat){ enableUI(); return; }
      if(typeof cv.then==='function'){ cv.then(m=>{ window.cv=m; enableUI(); }); return; }
      if(!cv._hooked){ cv._hooked=true; cv.onRuntimeInitialized=()=>{ if(!cvDone) enableUI(); }; }
    }
    if(Date.now()-start>30000){ if(!cvDone) cvFailed(); return; }
    setTimeout(wait,120);
  })();
}
function enableUI(){
  if(cvDone) return; cvDone=true; CV_READY=true;
  document.getElementById('drop-title').textContent='Tap to upload a card photo';
  document.getElementById('drop-btn').style.display='inline-block';
  const st=document.getElementById('status'); if(st&&st.querySelector('.err')) st.innerHTML='';
}
function cvFailed(){
  if(cvDone) return;
  document.getElementById('drop-title').textContent='Engine failed to load';
  showError('Could not load the OpenCV engine. Reload the page — it may have been a slow connection. If it keeps failing, try Chrome/Safari or turn off any ad-/script-blocker for this page.');
}
loadCv();
</script>
